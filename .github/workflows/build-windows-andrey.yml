name: Build Windows AndreyVPN

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows-portable:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: '3.38.5'
          channel: stable
          cache: true

      - name: Prepare Windows core
        shell: bash
        run: make windows-prepare

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Build external updater
        shell: pwsh
        run: |
          dotnet publish windows\updater\AndreyVPNUpdater.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o build\windows\x64\runner\Release\updater_publish
          Copy-Item build\windows\x64\runner\Release\updater_publish\AndreyVPNUpdater.exe build\windows\x64\runner\Release\AndreyVPNUpdater.exe -Force
          Remove-Item build\windows\x64\runner\Release\updater_publish -Recurse -Force

      - name: Package portable build
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath AndreyVPN-0.7.0-windows-portable.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AndreyVPN-0.7.0-windows-portable
          path: AndreyVPN-0.7.0-windows-portable.zip
