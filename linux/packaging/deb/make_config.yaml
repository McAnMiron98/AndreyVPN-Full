# Post-installation tasks:
# 1. Inject StartupWMClass into the system .desktop file for correct icon association
# 2. Remove conflicting andreyvpn.desktop files from users' .local directories (cleanup AppImage artifacts)
# 3. Update the desktop database to apply changes immediately
postinstall_scripts:
  - echo "Setting up AndreyVPN..."
  - sudo sed -i '/^\[Desktop Entry\]/a StartupWMClass=app.andreyvpn.com' "/usr/share/applications/andreyvpn.desktop"
  - echo "Search and remove andreyvpn.desktop from .local"
  - for user_dir in /home/*; do if [ -f "$user_dir/.local/share/applications/andreyvpn.desktop" ]; then rm -f "$user_dir/.local/share/applications/andreyvpn.desktop"; echo "Found and removed andreyvpn.desktop from $user_dir .local"; fi; done
  - update-desktop-database /usr/share/applications
  - echo "AndreyVPN is ready to use :)"

# Post-uninstallation tasks:
# 1. Iterate through all user directories to remove AndreyVPN configuration and data
# 2. Clean up root user data to ensure a clean removal
postuninstall_scripts:
  - echo "Removing AndreyVPN user data..."
  - for user_dir in /home/*; do if [ -d "$user_dir/.local/share/andreyvpn" ]; then rm -rf "$user_dir/.local/share/andreyvpn"; echo "Removed data from $user_dir"; fi; done
  - rm -rf /root/.local/share/andreyvpn
  - echo "AndreyVPN data cleanup complete."

